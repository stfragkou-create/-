<!DOCTYPE html><html lang="el"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Σωστό ή Λάθος</title><style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#eef4ff,#ffffff);color:#1f2937}
header{background:linear-gradient(135deg,#0f172a,#0b3d91,#2563eb);color:white;text-align:center;padding:42px 18px}
h1{margin:0;font-size:2.2rem}header p{font-size:1.1rem;max-width:850px;margin:12px auto}
main{max-width:1100px;margin:auto;padding:28px 18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}
.card{background:white;border-radius:22px;padding:22px;box-shadow:0 8px 24px rgba(0,0,0,.12);margin-bottom:18px}
.card:hover{transform:translateY(-3px);transition:.2s}.card h2,.card h3{color:#0b3d91;margin-top:0}
.button,button{display:inline-block;background:#0b3d91;color:white;border:0;padding:12px 18px;border-radius:14px;font-weight:bold;text-decoration:none;cursor:pointer;font-size:1rem;margin:4px}
.green{background:#059669}.purple{background:#7c3aed}.pink{background:#db2777}
.back{display:inline-block;margin-bottom:18px;color:#0b3d91;font-weight:bold;text-decoration:none}.badge{display:inline-block;background:#eef2ff;color:#3730a3;padding:10px 14px;border-radius:999px;font-weight:bold;margin:6px}
.feedback{font-weight:bold;margin-top:8px}.hidden{display:none}footer{text-align:center;background:#0f172a;color:white;padding:22px;margin-top:20px}
input,select{padding:12px;border-radius:12px;border:1px solid #bfdbfe;font-size:1rem;width:100%;max-width:520px}
video{width:100%;max-width:850px;border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.18)}
.q{border:1px solid #dbeafe;border-radius:18px;padding:16px;margin:14px 0;background:white}</style></head><body><header><h1>✅ Quiz: Σωστό ή Λάθος</h1><p>Παίξε και κέρδισε badge γνώσης.</p></header><main><a class="back" href="index.html">← Επιστροφή</a><div id="quiz"></div><h2 id="score"></h2><p id="badge"></p></main><script>
const data=[['Μπορώ να μοιράζομαι τον κωδικό μου με φίλους μου.',false],['Πριν κοινοποιήσω κάτι, ελέγχω αν είναι αληθινό.',true],['Τα προσωπικά δεδομένα πρέπει να προστατεύονται.',true],['Αν κάποιος με ενοχλεί online, το κρατάω μυστικό.',false],['Η τεχνητή νοημοσύνη μπορεί να κάνει λάθη.',true],['Ανοίγω πάντα links που μου στέλνουν άγνωστοι.',false],['Στο cyberbullying ζητώ βοήθεια από ενήλικα.',true],['Δεν πρέπει να δίνω προσωπικά στοιχεία σε εφαρμογές ΤΝ.',true]];
let correct=0,answered=0;const quiz=document.getElementById('quiz');
data.forEach((item,i)=>{let div=document.createElement('div');div.className='q';div.innerHTML='<p><b>'+(i+1)+'. '+item[0]+'</b></p><button onclick="answer('+i+',true)">Σωστό</button><button onclick="answer('+i+',false)">Λάθος</button><div class="feedback" id="f'+i+'"></div>';quiz.appendChild(div);});
function answer(i,val){let f=document.getElementById('f'+i);if(f.textContent)return;answered++;if(val===data[i][1]){correct++;f.textContent='Μπράβο! ✅';f.style.color='green'}else{f.textContent='Όχι ακριβώς ❌';f.style.color='crimson'}document.getElementById('score').textContent='Σκορ: '+correct+'/'+answered;if(answered===data.length){document.getElementById('badge').innerHTML=correct>=6?'<span class="badge">🏆 Digital Safety Star</span>':'<span class="badge">🔁 Προσπάθησε ξανά</span>';}}
</script></body></html>

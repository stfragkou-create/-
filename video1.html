<title>Βίντεο 1</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Arial,Helvetica,sans-serif;background:#070b1f;color:white}
body{
  background:
    radial-gradient(circle at 80% 20%, rgba(6,182,212,.28), transparent 24%),
    radial-gradient(circle at 15% 75%, rgba(124,58,237,.26), transparent 28%),
    linear-gradient(135deg,#070b1f 0%,#0b1025 48%,#1e1b4b 100%);
}
.topbar{
  position:sticky;top:0;z-index:1000;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:12px 28px;background:rgba(5,8,22,.94);
  border-bottom:1px solid rgba(255,255,255,.14);backdrop-filter:blur(12px)
}
.logo{font-weight:bold;color:#67e8f9;white-space:nowrap}
nav{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
nav a{
  color:white;text-decoration:none;font-size:.82rem;font-weight:bold;text-transform:lowercase;
  padding:7px 11px;border-radius:999px;background:rgba(255,255,255,.08)
}
nav a:hover,.active{background:#2563eb!important}
.page{max-width:1180px;margin:auto;padding:46px 7% 70px}
.hero{
  min-height:calc(100vh - 62px);display:grid;grid-template-columns:1.1fr .9fr;
  align-items:center;gap:28px;padding:60px 8%;
}
.hero h1{font-size:3.5rem;margin:0 0 12px;line-height:1.05}
.hero h2{font-size:2rem;color:#67e8f9;margin:0 0 18px}
.hero p,.lead{font-size:1.16rem;line-height:1.7;color:#dbeafe}
.hero-visual{font-size:8rem;text-align:center;filter:drop-shadow(0 0 28px rgba(103,232,249,.55))}
.card{
  background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.15);
  border-radius:26px;padding:28px;box-shadow:0 12px 35px rgba(0,0,0,.28);backdrop-filter:blur(10px)
}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:22px}
.tile{min-height:190px;transition:.25s}.tile:hover{transform:translateY(-6px);border-color:#67e8f9}
.icon{font-size:3.2rem}.tile h3{text-transform:lowercase;margin:12px 0 8px}
.button,button{
  display:inline-block;margin-top:14px;background:#2563eb;color:white;text-decoration:none;
  padding:12px 18px;border:0;border-radius:14px;font-weight:bold;cursor:pointer;font-size:1rem
}
.green{background:#059669}.purple{background:#7c3aed}.pink{background:#db2777}.orange{background:#ea580c}
h1.page-title{text-align:center;font-size:2.7rem;margin:0 0 12px}h2{text-align:center}
.video-frame{position:relative;width:100%;padding-top:56.25%;border-radius:22px;overflow:hidden;background:#000}
.video-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.footer{text-align:center;padding:24px;color:#cbd5e1}
@media(max-width:850px){
  .topbar{align-items:flex-start;flex-direction:column}.hero{grid-template-columns:1fr;text-align:center}.hero h1{font-size:2.45rem}.hero-visual{font-size:5rem}
}
</style>
</head>
<body>

<h1 class="page-title">🎬 Βίντεο 1</h1>
<p class="lead" style="text-align:center">Αφόρμηση: τι σημαίνει ασφαλής και υπεύθυνη παρουσία στο διαδίκτυο;</p>
